<!DOCTYPE html>
<html lang="ja"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>たしのまとめ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f6f8fd 0%, #f1f5f9 100%);
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-sub: #718096;
            --accent-color: #667eea; 
            --accent-hover: #764ba2; 
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-top: 50px;
            margin-bottom: 30px;
            padding: 20px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            outline: none;
        }

        /* 編集パネル */
        .builder-ui {
            background: #fff;
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            position: sticky;
            top: 20px;
            z-index: 100;
            border: 2px solid var(--accent-color);
        }

        .builder-ui button {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            background: var(--accent-color);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .builder-ui button:hover { background: var(--accent-hover); }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 800px;
            padding: 0 20px 60px;
            box-sizing: border-box;
        }

        .tile {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 35px 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: all 0.4s ease;
            position: relative;
            z-index: 1;
        }

        .tile i.main-icon {
            font-size: 2.8rem;
            color: var(--accent-color);
            margin-bottom: 18px;
            transition: color 0.4s ease;
        }

        .tile span.tile-text {
            color: var(--text-main);
            font-weight: 700;
            font-size: 1.05rem;
            text-align: center;
            line-height: 1.5;
            transition: color 0.4s ease;
            outline: none;
        }

        /* 閲覧モード（通常時）のアニメーション */
        body:not(.is-editing) .tile:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.2);
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
        }
        body:not(.is-editing) .tile:hover i.main-icon,
        body:not(.is-editing) .tile:hover span.tile-text {
            color: #ffffff;
        }

        /* 編集モード用 */
        .edit-only { display: none; }
        body.is-editing .edit-only { display: flex; }
        body.is-editing .tile { border: 2px dashed #cbd5e0; box-shadow: none; }

        .tile-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            gap: 5px;
            z-index: 10;
        }

        .tile-action-btn {
            background: #edf2f7;
            color: #4a5568;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .tile-action-btn:hover { background: var(--accent-color); color: white; }
        .delete-btn:hover { background: #e53e3e !important; }

        @media (max-width: 480px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }
    </style>
</head>
<body class="">

    

    <header class="header">
        <h1 id="page-title">たしのまとめ</h1>
    </header>

    <main class="grid-container" id="link-container">
        <a href="image-gen.html" class="tile">
            
            <i class="fa-solid fa-wand-magic-sparkles main-icon"></i>
            <span class="tile-text">画像生成<br>補助ツール</span>
        </a>

        <a href="routine-gen.html" class="tile">
            
            <i class="fa-solid fa-clock-rotate-left main-icon"></i>
            <span class="tile-text">定期作成<br>補助ツール</span>
        </a>

        <a href="icon-frame.html" class="tile">
            
            <i class="fa-solid fa-crop-simple main-icon"></i>
            <span class="tile-text">アイコンフレーム<br>補助ツール</span>
        </a>

        <a href="glossary.html" class="tile">
            
            <i class="fa-solid fa-book-open main-icon"></i>
            <span class="tile-text">配信用語集</span>
        </a>
    </main>

    


</body></html>
