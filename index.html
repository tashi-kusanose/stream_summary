<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>たしのまとめ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f6f8fd 0%, #f1f5f9 100%);
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-sub: #718096;
            --accent-color: #667eea; 
            --accent-hover: #764ba2; 
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ヘッダーデザイン */
        .header {
            text-align: center;
            margin-top: 50px;
            margin-bottom: 40px;
            padding: 20px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* タイルの配置設定 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 800px;
            padding: 0 20px 60px;
            box-sizing: border-box;
        }

        /* タイルボタンの基本デザイン */
        .tile {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 35px 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* ホバー時の浮き上がりアニメーション */
        .tile:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.2);
        }

        /* ホバー時の背景グラデーションアニメーション */
        .tile::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
        }

        .tile:hover::before {
            opacity: 1;
        }

        /* アイコンの調整 */
        .tile i {
            font-size: 2.8rem;
            color: var(--accent-color);
            margin-bottom: 18px;
            transition: color 0.4s ease;
        }

        /* テキストの調整 */
        .tile span {
            color: var(--text-main);
            font-weight: 700;
            font-size: 1.05rem;
            text-align: center;
            line-height: 1.5;
            transition: color 0.4s ease;
        }

        /* ホバー時にアイコンとテキストを白に反転 */
        .tile:hover i,
        .tile:hover span {
            color: #ffffff;
        }

        /* スマートフォン向けのレスポンシブ対応 */
        @media (max-width: 480px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .tile {
                padding: 25px 10px;
                border-radius: 16px;
            }
            .tile i {
                font-size: 2.2rem;
                margin-bottom: 12px;
            }
            .tile span {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>たしのまとめ</h1>
    </header>

    <main class="grid-container">
        <a href="https://tashi-kusanose.github.io/ChatGPT_promptmaker/" class="tile">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <span>画像生成<br>補助ツール</span>
        </a>

        <a href="routine-gen.html" class="tile">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>定期作成<br>補助ツール</span>
        </a>

        <a href="https://tashi-kusanose.github.io/iconframe_maker/" class="tile">
            <i class="fa-solid fa-crop-simple"></i>
            <span>アイコンフレーム<br>補助ツール</span>
        </a>

        <a href="https://tashi-kusanose.github.io/stream_Glossary/" class="tile">
            <i class="fa-solid fa-book-open"></i>
            <span>配信用語集</span>
        </a>
        
    </main>

</body>
</html>
